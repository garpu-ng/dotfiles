general {
    grace = 86400000
    hide_cursor = true
}

background {
    monitor =
    path = screenshot
    blur_passes = 4
    blur_size = 6
    noise = 0.02
    contrast = 0.9
    brightness = 0.6
    vibrancy = 0.2
}

input-field {
    monitor = DP-1
    size = 280, 45
    outline_thickness = 1
    dots_size = 0.25
    dots_spacing = 0.2
    dots_center = true
    outer_color = rgba(ffffff20)
    inner_color = rgba(00000060)
    font_color = rgba(ffffffcc)
    fade_on_empty = true
    fade_timeout = 2000
    placeholder_text = <span foreground="##ffffff99" font_family="Jost">Password...</span>
    hide_input = false
    rounding = 10
    check_color = rgba(ffffff40)
    fail_color = rgba(ff000066)
    fail_text = <span foreground="##ff6666" font_family="Jost">$FAIL</span>
    capslock_color = rgba(ffaa0066)
    position = 0, -120
    halign = center
    valign = center
}

label {
    monitor = DP-1
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = rgba(ffffffee)
    font_size = 72
    font_family = Jost
    position = 0, 80
    halign = center
    valign = center
}

label {
    monitor = DP-1
    text = cmd[update:60000] echo "$(date +"%A, %B %d")"
    color = rgba(ffffff99)
    font_size = 18
    font_family = Jost
    position = 0, 20
    halign = center
    valign = center
}
