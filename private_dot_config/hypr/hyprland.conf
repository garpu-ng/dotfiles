# ── Monitors ──────────────────────────────────────────────────────
monitor = DP-1, 3440x1440@144, 0x0, 1
monitor = DP-2, 1920x1080@144, 3440x0, 1

# ── Autostart ─────────────────────────────────────────────────────
exec-once = hyprpaper
exec-once = mako
exec-once = hypridle
exec-once = qs
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
# kded6 disabled — Quickshell owns systray watcher now (Nemo replaces Dolphin as default FM)
# exec-once = sleep 4 && XDG_MENU_PREFIX=arch- kded6
exec-once = sleep 2 && xembedsniproxy
exec-once = sleep 6 && vesktop
exec-once = sleep 6 && /opt/vivaldi/vivaldi --profile-directory=Default --app-id=hnpfjngllnobngcgfapefoaidbinmjnm
exec-once = hyprswitch init --custom-css ~/.config/hyprswitch/style.css &
exec-once = pypr
plugin = /var/cache/hyprpm/kaan/split-monitor-workspaces/split-monitor-workspaces.so
plugin = /var/cache/hyprpm/kaan/hy3/hy3.so

# ── Environment Variables (NVIDIA) ───────────────────────────────
env = LIBVA_DRIVER_NAME,nvidia
env = XDG_SESSION_TYPE,wayland
env = GBM_BACKEND,nvidia-drm
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = NVD_BACKEND,direct
env = XCURSOR_THEME,phinger-cursors-light
env = XCURSOR_SIZE,24
env = QT_QPA_PLATFORM,wayland
env = QT_QPA_PLATFORMTHEME,qt6ct
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = MOZ_ENABLE_WAYLAND,1
env = ELECTRON_OZONE_PLATFORM_HINT,auto
env = XDG_MENU_PREFIX,arch-
env = GTK_THEME,Adwaita:dark

# ── Input ─────────────────────────────────────────────────────────
input {
    kb_layout = de
    kb_variant = nodeadkeys
    numlock_by_default = true
    follow_mouse = 1
    sensitivity = -0.35
    accel_profile = flat
}

# ── General ───────────────────────────────────────────────────────
general {
    gaps_in = 4
    gaps_out = 8
    border_size = 1
    col.active_border = rgba(ffffff30)
    col.inactive_border = rgba(00000000)
    layout = hy3
    allow_tearing = true
}

# ── hy3 (i3-like tiling) ──────────────────────────────────────────
plugin {
    hy3 {
        no_gaps_when_only = 0
        node_collapse_policy = 2
        tab_first_window = false
        tabs {
            height = 26
            padding = 6
            from_top = true
            rounding = 6
            render_text = true
            text_height = 10
            text_padding = 6
            col.active = rgba(2a2a2aee)
            col.inactive = rgba(000000aa)
            col.urgent = rgba(ff5555ff)
            col.active.border = rgba(ffffffaa)
            col.inactive.border = rgba(00000040)
            col.active.text = rgba(ffffffff)
            col.inactive.text = rgba(ffffffaa)
        }
    }
}

# ── Decoration ────────────────────────────────────────────────────
decoration {
    rounding = 10

    blur {
        enabled = true
        size = 6
        passes = 3
        new_optimizations = true
        xray = false
        noise = 0.02
        contrast = 1.0
        brightness = 1.0
        vibrancy = 0.2
        special = true
    }

    dim_special = 0.4

    shadow {
        enabled = true
        range = 15
        render_power = 3
        color = rgba(00000055)
        offset = 0 2
    }

    dim_inactive = false
    active_opacity = 1.0
    inactive_opacity = 0.95
}

# ── Animations ────────────────────────────────────────────────────
animations {
    enabled = true

    bezier = fluent, 0.25, 1.0, 0.5, 1.0
    bezier = fluentDecel, 0.1, 1.0, 0.0, 1.0
    bezier = fluentAccel, 0.5, 0.0, 0.75, 0.0
    bezier = softSnap, 0.2, 0.9, 0.1, 1.05

    animation = windows, 1, 3, fluent, popin 80%
    animation = windowsIn, 1, 3, fluentDecel, popin 80%
    animation = windowsOut, 1, 2, fluentAccel, popin 80%
    animation = windowsMove, 1, 3, fluent, slide
    animation = fade, 1, 3, fluent
    animation = workspaces, 1, 3, fluent, slide
    animation = specialWorkspace, 1, 3, softSnap, slidevert
}

# ── Layout ────────────────────────────────────────────────────────
dwindle {
    pseudotile = true
    preserve_split = true
    force_split = 2
}

# ── Misc ──────────────────────────────────────────────────────────
misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    disable_splash_rendering = true
    mouse_move_enables_dpms = true
    key_press_enables_dpms = true
    vfr = true
    vrr = 1
}

cursor {
    no_hardware_cursors = false
}

# ── Plugin: split-monitor-workspaces ──────────────────────────────
plugin {
    split-monitor-workspaces {
        count = 3
    }
}

# ── Layer Rules (blur for overlays) ──────────────────────────────
layerrule = blur on, match:namespace eww-bar0
layerrule = ignore_alpha 0.3, match:namespace eww-bar0
layerrule = blur on, match:namespace eww-bar1
layerrule = ignore_alpha 0.3, match:namespace eww-bar1
layerrule = blur on, match:namespace wofi
layerrule = ignore_alpha 0.3, match:namespace wofi
layerrule = blur on, match:namespace notifications
layerrule = ignore_alpha 0.3, match:namespace notifications
layerrule = blur on, match:namespace quickshell
layerrule = ignore_alpha 0.3, match:namespace quickshell
layerrule = blur on, match:namespace quickshell-audio
layerrule = ignore_alpha 0.3, match:namespace quickshell-audio
layerrule = blur on, match:namespace quickshell-power
layerrule = ignore_alpha 0.3, match:namespace quickshell-power
layerrule = blur on, match:namespace quickshell-media
layerrule = ignore_alpha 0.3, match:namespace quickshell-media
layerrule = blur on, match:namespace quickshell-osd
layerrule = ignore_alpha 0.3, match:namespace quickshell-osd
layerrule = blur on, match:namespace quickshell-hotkeys
layerrule = ignore_alpha 0.3, match:namespace quickshell-hotkeys
layerrule = blur on, match:namespace eww-audio
layerrule = ignore_alpha 0.3, match:namespace eww-audio
layerrule = blur on, match:namespace eww-power
layerrule = ignore_alpha 0.3, match:namespace eww-power
layerrule = blur on, match:namespace eww-media
layerrule = ignore_alpha 0.3, match:namespace eww-media
layerrule = blur on, match:namespace hyprswitch
layerrule = ignore_alpha 0.3, match:namespace hyprswitch

# ── Window Rules ──────────────────────────────────────────────────
windowrule = opacity 0.90 0.85 1, match:class com.mitchellh.ghostty
windowrule = opacity 1.0 override 1.0 override 1.0 override, match:class ^(mpv)$
windowrule = opacity 1.0 override 1.0 override 1.0 override, match:class ^(vivaldi-stable)$
windowrule = float on, match:class com.mitchellh.ghostty
windowrule = float on, match:class ^(qimgv)$
windowrule = float on, match:class ^(Claude)$
windowrule = opacity 0.95 0.90 1, match:class nemo
windowrule = float on, match:class nemo
windowrule = float on, match:class org.kde.dolphin
windowrule = float on, match:class xdg-desktop-portal-gtk
windowrule = float on, match:class xdg-desktop-portal-kde
windowrule = float on, match:class ^(org\.freedesktop\.impl\.portal\.desktop\..*)$
windowrule = size 1000 700, match:class ^(org\.freedesktop\.impl\.portal\.desktop\..*)$
windowrule = center on, match:class ^(org\.freedesktop\.impl\.portal\.desktop\..*)$

# XEmbed tray proxy (Steam, Vesktop, Wine apps)
windowrule = opacity 0.0, match:xwayland true, match:title ^$, match:class ^$
windowrule = float on, match:xwayland true, match:title ^$, match:class ^$
windowrule = no_blur on, match:xwayland true, match:title ^$, match:class ^$
windowrule = no_shadow on, match:xwayland true, match:title ^$, match:class ^$
windowrule = size 0 0, match:xwayland true, match:title ^$, match:class ^$

# Steam
windowrule = float on, match:class steam
windowrule = float on, match:title ^(Steam)$
windowrule = immediate on, match:class ^steam_app

# Wine/Lutris games (tearing = bypass compositor)
windowrule = immediate on, match:class ^wine
windowrule = immediate on, match:class ^gamescope

# World of Warcraft: prevent Wine from dropping fullscreen on external attention requests
windowrule = suppress_event fullscreen maximize activate, match:title ^(World of Warcraft)$


# ── Special Workspaces on Primary Monitor ────────────────────────
workspace = special:magic, monitor:DP-1
workspace = special:claude, monitor:DP-1

# Discord & WhatsApp → special workspace, tiled
windowrule = workspace special:magic silent, match:class vesktop
windowrule = tile on, match:class vesktop
windowrule = workspace special:magic silent, match:class vivaldi-hnpfjngllnobngcgfapefoaidbinmjnm-Default
windowrule = tile on, match:class vivaldi-hnpfjngllnobngcgfapefoaidbinmjnm-Default

# Claude Code scratchpad (ghostty with class claude-code, spawned by Super+C)
windowrule = workspace special:claude silent, match:class ^(com\.kaan\.claude-code)$
windowrule = float on, match:class ^(com\.kaan\.claude-code)$
windowrule = size 70% 80%, match:class ^(com\.kaan\.claude-code)$
windowrule = center on, match:class ^(com\.kaan\.claude-code)$

# ── Keybindings ───────────────────────────────────────────────────
$mod = SUPER

# Core
bind = $mod, Return, exec, ghostty
bind = $mod, B, exec, vivaldi --enable-features=UseOzonePlatform --ozone-platform=wayland
bind = $mod, E, exec, nemo
bind = $mod, Space, exec, pkill wofi || wofi --show drun
bind = $mod, Q, killactive
bind = $mod SHIFT, M, exit
bind = $mod SHIFT, R, exec, hyprctl reload

# Window Management
bind = $mod, V, togglefloating
bind = $mod, F, fullscreen, 0
bind = $mod, P, pseudo

# hy3: i3-style splits & tabs
bind = $mod, H, hy3:makegroup, h                  # split horizontal
bind = $mod SHIFT, V, hy3:makegroup, v            # split vertical
bind = $mod, T, hy3:makegroup, tab                # tab group (like i3)
bind = $mod SHIFT, T, hy3:changegroup, untab      # untab (back to split)
bind = $mod, O, hy3:changegroup, opposite         # toggle horizontal/vertical split
bind = $mod, R, hy3:changefocus, raise            # focus parent node
bind = $mod SHIFT, R, hy3:changefocus, lower      # focus child node
# hyprswitch: Alt+Tab window switcher
bind = ALT, Tab, exec, hyprswitch gui --mod-key alt_l --key tab --close mod-key-release --include-special-workspaces
bind = ALT SHIFT, Tab, exec, hyprswitch gui --mod-key alt_l --key tab --close mod-key-release --reverse-key=mod=shift --include-special-workspaces

bind = $mod ALT, left, hy3:movewindow, l
bind = $mod ALT, right, hy3:movewindow, r
bind = $mod ALT, up, hy3:movewindow, u
bind = $mod ALT, down, hy3:movewindow, d

# Special Workspace
bind = $mod, Tab, togglespecialworkspace, magic
bind = $mod SHIFT, Tab, movetoworkspace, special:magic

# Move focus
bind = $mod, left, movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up, movefocus, u
bind = $mod, down, movefocus, d

# Toggle active window to 16:9 floating centered
bind = $mod, M, exec, ~/.local/bin/video-center

# Claude Code scratchpad (spawns ghostty running claude, toggles special workspace)
bind = $mod, C, exec, ~/.local/bin/claude-scratchpad

# Switch workspaces (split-monitor-workspaces)
bind = $mod, 1, split-workspace, 1
bind = $mod, 2, split-workspace, 2
bind = $mod, 3, split-workspace, 3

# Move window to workspace
bind = $mod SHIFT, 1, split-movetoworkspace, 1
bind = $mod SHIFT, 2, split-movetoworkspace, 2
bind = $mod SHIFT, 3, split-movetoworkspace, 3

# Scroll through workspaces per monitor
bind = $mod, mouse_down, split-cycleworkspaces, +1
bind = $mod, mouse_up, split-cycleworkspaces, -1

# Move/resize windows with mouse
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# Media Keys
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPrev, exec, playerctl previous
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.0 @DEFAULT_AUDIO_SINK@ 2%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 2%-
bindl = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

# Screenshot (region only → clipboard + save + Japanese notification)
bind = $mod SHIFT, S, exec, grim -g "$(slurp)" - | tee ~/Pictures/Screenshots/$(date +%Y%m%d_%H%M%S).png | wl-copy && notify-send "画面撮影完了" "クリップボードに保存しました" -i image-x-generic

# Pyprland scratchpads
bind = $mod, S, exec, pypr toggle spotify
