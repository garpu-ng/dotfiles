# ── OSC / UI ──────────────────────────────────────────────────────
osc=no
border=no
osd-bar=no

# ── Subtitles ─────────────────────────────────────────────────────
sub-font="Jost"
sub-font-size=42
sub-color="#d8a600"
sub-border-color="#000000"
sub-border-size=1
sub-shadow-offset=1
sub-shadow-color="#00000080"

# ── Video ─────────────────────────────────────────────────────────
vo=gpu-next
gpu-api=opengl
hwdec=auto-safe
demuxer-max-bytes=512MiB
demuxer-max-back-bytes=256MiB

# ── Audio ─────────────────────────────────────────────────────────
volume=80
volume-max=150

# ── Playback ──────────────────────────────────────────────────
save-position-on-quit=yes
